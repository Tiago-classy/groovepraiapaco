<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatura – Groove Praia do Paçô</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green-dark: #2a3f35;
            --green-mid: #3d6b56;
            --sand: #e8dbc8;
            --white: #f7f3ee;
        }

        html, body {
            min-height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: var(--green-dark);
            color: var(--white);
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .page-header {
            position: relative;
            width: 100%;
            padding: clamp(3rem, 8vw, 5rem) 1.5rem clamp(2rem, 5vw, 3rem);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            text-align: center;
            overflow: hidden;
        }

        .page-header__bg {
            position: absolute;
            inset: 0;
            background-image: url('images/beach.jpeg');
            background-size: cover;
            background-position: center 40%;
            filter: brightness(0.35);
        }

        .page-header__overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(30, 50, 40, 0.3) 0%,
                rgba(42, 63, 53, 1) 100%
            );
        }

        .page-header__content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        .page-header__logo {
            width: min(180px, 40vw);
            filter: brightness(0) invert(1);
        }

        .page-header__divider {
            width: 50px;
            height: 1px;
            background: var(--sand);
            opacity: 0.5;
        }

        .page-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 300;
            color: var(--sand);
            letter-spacing: 0.03em;
        }

        .page-header p {
            font-size: clamp(0.72rem, 2vw, 0.82rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(232, 219, 200, 0.65);
        }

        /* ── FORM WRAPPER ── */
        .form-section {
            padding: clamp(2rem, 6vw, 4rem) clamp(1.5rem, 6vw, 3rem) clamp(3rem, 8vw, 5rem);
            display: flex;
            justify-content: center;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 8px;
            padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 5vw, 3rem);
            width: 100%;
            max-width: 680px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        /* ── FORM ELEMENTS ── */
        .form-group {
            margin-bottom: 1.6rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--sand);
            margin-bottom: 0.6rem;
        }

        .form-group label .required {
            color: #a8c9b8;
            margin-left: 0.15rem;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="tel"],
        .form-group input[type="date"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            padding: 0.75rem 1rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.88rem;
            font-weight: 300;
            color: var(--white);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-group input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
            cursor: pointer;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="email"]:focus,
        .form-group input[type="tel"]:focus,
        .form-group input[type="date"]:focus {
            border-color: rgba(232, 219, 200, 0.5);
            background: rgba(255, 255, 255, 0.09);
        }

        .form-group input::placeholder {
            color: rgba(247, 243, 238, 0.28);
        }

        /* ── ROW GRID ── */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        /* ── RADIO GROUP ── */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            margin-top: 0.25rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1.5px solid rgba(232, 219, 200, 0.45);
            border-radius: 50%;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s;
        }

        .radio-option input[type="radio"]:checked {
            border-color: var(--sand);
            background: radial-gradient(circle, var(--sand) 45%, transparent 50%);
        }

        .radio-option span {
            font-size: 0.86rem;
            font-weight: 300;
            color: rgba(247, 243, 238, 0.8);
        }

        .outra-input {
            margin-left: 1.65rem;
            margin-top: 0.35rem;
            width: calc(100% - 1.65rem);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            padding: 0.55rem 0.85rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.84rem;
            font-weight: 300;
            color: var(--white);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            display: none;
        }

        .outra-input:focus {
            border-color: rgba(232, 219, 200, 0.5);
            background: rgba(255, 255, 255, 0.09);
        }

        .outra-input.visible {
            display: block;
        }

        /* ── FILE UPLOAD ── */
        .file-upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 1.6rem 1.2rem;
            border: 1.5px dashed rgba(232, 219, 200, 0.3);
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.2s, background 0.2s;
        }

        .file-upload-label:hover {
            border-color: rgba(232, 219, 200, 0.55);
            background: rgba(255, 255, 255, 0.04);
        }

        .file-upload-label svg {
            width: 28px;
            height: 28px;
            stroke: rgba(232, 219, 200, 0.55);
        }

        .file-upload-label span {
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(247, 243, 238, 0.5);
            letter-spacing: 0.05em;
        }

        .file-upload-label strong {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--sand);
            letter-spacing: 0.06em;
        }

        #cv-filename {
            font-size: 0.78rem;
            color: #a8c9b8;
            font-weight: 400;
            display: none;
        }

        input[type="file"] {
            display: none;
        }

        /* ── DIVIDER ── */
        .form-divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 2rem 0;
        }

        /* ── SUBMIT ── */
        .btn-submit {
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: var(--sand);
            color: var(--green-dark);
            border: none;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        .btn-submit:hover {
            background: #f0e4cf;
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* ── SUCCESS / ERROR MESSAGES ── */
        .form-message {
            display: none;
            text-align: center;
            padding: 1rem 1.2rem;
            border-radius: 4px;
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.04em;
            margin-top: 1rem;
        }

        .form-message.success {
            background: rgba(100, 180, 130, 0.15);
            border: 1px solid rgba(100, 180, 130, 0.35);
            color: #a8d9bb;
        }

        .form-message.error {
            background: rgba(200, 90, 90, 0.12);
            border: 1px solid rgba(200, 90, 90, 0.3);
            color: #e0a0a0;
        }

        /* ── FOOTER ── */
        footer {
            background: #1a2820;
            padding: 2rem clamp(1.5rem, 5vw, 4rem);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .footer__copy {
            font-size: 0.72rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            color: rgba(247, 243, 238, 0.35);
            text-transform: uppercase;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 520px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="page-header">
        <div class="page-header__bg"></div>
        <div class="page-header__overlay"></div>
        <div class="page-header__content">
            <a href="index.html">
                <img class="page-header__logo" src="images/logo.png" alt="Groove Praia do Paçô">
            </a>
            <div class="page-header__divider"></div>
            <h1>Candidatura Espontânea</h1>
            <p>Junta-te à nossa equipa</p>
        </div>
    </header>

    <!-- FORM -->
    <section class="form-section">
        <div class="form-card">

            <!--
                FORMSPREE SETUP:
                1. Vai a https://formspree.io e cria uma conta gratuita.
                2. Cria um novo form e adiciona geral@groovepraiapaco.pt como destinatário.
                3. Substitui "YOUR_FORM_ID" no atributo action pelo teu ID (ex: xpwzelrv).
                4. O plano gratuito suporta 50 envios/mês e ficheiros até 25 MB.
            -->
            <form
                id="candidatura-form"
                action="https://formspree.io/f/mykorpjw"
                method="POST"
                enctype="multipart/form-data"
                novalidate
            >

                <!-- Dados pessoais -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome completo <span class="required">*</span></label>
                        <input type="text" id="nome" name="Nome completo" placeholder="O teu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="nascimento">Data de nascimento <span class="required">*</span></label>
                        <input type="date" id="nascimento" name="Data de nascimento" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input type="email" id="email" name="Email" placeholder="exemplo@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="telemovel">Número de telemóvel <span class="required">*</span></label>
                        <input type="tel" id="telemovel" name="Número de telemóvel" placeholder="+351 9XX XXX XXX" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nacionalidade">Nacionalidade <span class="required">*</span></label>
                    <input type="text" id="nacionalidade" name="Nacionalidade" placeholder="ex. Portuguesa" required>
                </div>

                <div class="form-divider"></div>

                <!-- Escolaridade -->
                <div class="form-group">
                    <label>Escolaridade <span class="required">*</span></label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="Escolaridade" value="Ensino secundário" required>
                            <span>Ensino secundário</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="Escolaridade" value="Licenciado">
                            <span>Licenciado</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="Escolaridade" value="Mestrado">
                            <span>Mestrado</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="Escolaridade" value="Curso profissionalizante">
                            <span>Curso profissionalizante</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="Escolaridade" id="outra-radio" value="Outra">
                            <span>Outra</span>
                        </label>
                        <input
                            type="text"
                            id="outra-text"
                            name="Escolaridade (outra)"
                            class="outra-input"
                            placeholder="Especifica a tua escolaridade…"
                        >
                    </div>
                </div>

                <div class="form-divider"></div>

                <!-- Disponibilidade -->
                <div class="form-group">
                    <label for="disponibilidade">Disponibilidade para começar <span class="required">*</span></label>
                    <input type="date" id="disponibilidade" name="Disponibilidade para começar" required>
                </div>

                <!-- CV -->
                <div class="form-group">
                    <label>Currículo Vitae <span class="required">*</span></label>
                    <label class="file-upload-label" for="cv-file" id="cv-upload-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <strong>Clica para carregar o teu CV</strong>
                        <span>PDF, DOC ou DOCX · máx. 10 MB</span>
                        <span id="cv-filename"></span>
                    </label>
                    <input
                        type="file"
                        id="cv-file"
                        name="Currículo Vitae"
                        accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                        required
                    >
                </div>

                <div class="form-divider"></div>

                <button type="submit" class="btn-submit">Enviar candidatura</button>

                <div class="form-message success" id="msg-success">
                    Candidatura enviada com sucesso! Entraremos em contacto em breve.
                </div>
                <div class="form-message error" id="msg-error">
                    Ocorreu um erro ao enviar. Por favor tenta novamente ou contacta-nos directamente.
                </div>

            </form>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p class="footer__copy">&copy; 2026 Groove Praia do Paçô</p>
    </footer>

    <script>
        // Show/hide "Outra" text input
        const outraRadio = document.getElementById('outra-radio');
        const outraText  = document.getElementById('outra-text');

        document.querySelectorAll('input[name="Escolaridade"]').forEach(function(radio) {
            radio.addEventListener('change', function() {
                if (outraRadio.checked) {
                    outraText.classList.add('visible');
                    outraText.required = true;
                } else {
                    outraText.classList.remove('visible');
                    outraText.required = false;
                    outraText.value = '';
                }
            });
        });

        // Show selected filename
        document.getElementById('cv-file').addEventListener('change', function() {
            var filenameEl = document.getElementById('cv-filename');
            if (this.files && this.files[0]) {
                filenameEl.textContent = this.files[0].name;
                filenameEl.style.display = 'block';
            } else {
                filenameEl.textContent = '';
                filenameEl.style.display = 'none';
            }
        });

        // Handle form submission via Fetch (Formspree AJAX)
        var form = document.getElementById('candidatura-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            var btn     = form.querySelector('.btn-submit');
            var success = document.getElementById('msg-success');
            var error   = document.getElementById('msg-error');

            // Basic client-side validation
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            btn.disabled = true;
            btn.textContent = 'A enviar…';
            success.style.display = 'none';
            error.style.display   = 'none';

            var data = new FormData(form);

            // Append recipient hint for Formspree (configure in dashboard too)
            data.append('_replyto', document.getElementById('email').value);
            data.append('_subject', 'Nova candidatura – ' + document.getElementById('nome').value);

            fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            })
            .then(function(response) {
                if (response.ok) {
                    success.style.display = 'block';
                    form.reset();
                    outraText.classList.remove('visible');
                    document.getElementById('cv-filename').style.display = 'none';
                } else {
                    return response.json().then(function(data) {
                        throw new Error(data.error || 'Erro desconhecido');
                    });
                }
            })
            .catch(function() {
                error.style.display = 'block';
            })
            .finally(function() {
                btn.disabled = false;
                btn.textContent = 'Enviar candidatura';
            });
        });
    </script>

</body>
</html>
